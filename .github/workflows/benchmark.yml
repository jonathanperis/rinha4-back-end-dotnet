name: Competitor Benchmark

on:
  workflow_dispatch:
    inputs:
      compose_file:
        description: Compose file to benchmark
        required: true
        default: all-comparison
        type: choice
        options:
          - all-comparison
          - competitor-compose/jonathanperis/docker-compose.yml
          - competitor-compose/zan-latest/docker-compose.yml
          - competitor-compose/danilo-latest/docker-compose.yml
          - competitor-compose/pedro-latest/docker-compose.yml
          - competitor-compose/fksegundo-rust/docker-compose.yml
          - competitor-compose/ronieneubauer-rinha2026/docker-compose.yml
          - competitor-compose/jordao-latest/docker-compose.yml
          - competitor-compose/hanake0-latest/docker-compose.yml
      official_ref:
        description: Rinha official repo ref to clone for test/test.js and test-data.json
        required: true
        default: main
      k6_image:
        description: k6 Docker image
        required: true
        default: grafana/k6:latest
      webapi_image:
        description: Optional Jonathan Peris image override
        required: false
        default: ""
      benchmark_repetitions:
        description: Number of k6 repetitions; median p99 is selected when >1
        required: true
        default: "1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  select-participants:
    name: Select comparison participants
    runs-on: ubuntu-latest
    outputs:
      participants: ${{ steps.participants.outputs.participants }}
    steps:
      - id: participants
        shell: bash
        run: |
          set -euo pipefail

          # Cost-control policy for all-comparison:
          # - Always run Jonathan.
          # - Prefer the current top global competitors when their official preview
          #   ranking entries are ahead of us.
          # - Disabled/older competitors remain selectable explicitly via workflow input.
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import sys
          import urllib.request

          selected = "${{ inputs.compose_file }}"
          participants = {
              "jonathanperis": {
                  "name": "jonathanperis",
                  "compose_file": "competitor-compose/jonathanperis/docker-compose.yml",
                  "repo": "https://github.com/jonathanperis/rinha4-back-end-dotnet",
              },
              "danilo-latest": {
                  "name": "danilo-latest",
                  "compose_file": "competitor-compose/danilo-latest/docker-compose.yml",
                  "repo": "https://github.com/daniloitagyba/rinha-2026-dotnet",
              },
              "pedro-latest": {
                  "name": "pedro-latest",
                  "compose_file": "competitor-compose/pedro-latest/docker-compose.yml",
                  "repo": "https://github.com/pedrosakuma/rinha-backend-2026",
              },
              "fksegundo-rust": {
                  "name": "fksegundo-rust",
                  "compose_file": "competitor-compose/fksegundo-rust/docker-compose.yml",
                  "repo": "https://github.com/fksegundo/rinha-rust",
              },
              "ronieneubauer-rinha2026": {
                  "name": "ronieneubauer-rinha2026",
                  "compose_file": "competitor-compose/ronieneubauer-rinha2026/docker-compose.yml",
                  "repo": "https://github.com/RonieNeubauer/rinha2026",
              },
              "jordao-latest": {
                  "name": "jordao-latest",
                  "compose_file": "competitor-compose/jordao-latest/docker-compose.yml",
                  "repo": "https://github.com/JordaoGustavo/rinha-backend-2026",
              },
              "zan-latest": {
                  "name": "zan-latest",
                  "compose_file": "competitor-compose/zan-latest/docker-compose.yml",
                  "repo": "",
              },
              "hanake0-latest": {
                  "name": "hanake0-latest",
                  "compose_file": "competitor-compose/hanake0-latest/docker-compose.yml",
                  "repo": "",
              },
          }
          by_compose = {v["compose_file"]: v for v in participants.values()}

          def emit(rows):
              print("participants=" + json.dumps(rows, separators=(",", ":")))

          if selected != "all-comparison":
              row = by_compose.get(selected)
              if row is None:
                  print(f"Unsupported compose_file={selected}", file=sys.stderr)
                  sys.exit(1)
              emit([{"name": row["name"], "compose_file": row["compose_file"]}])
              sys.exit(0)

          url = "https://raw.githubusercontent.com/arinhadebackend/arinhadebackend.github.io/2026-preview/results-preview.json"
          fallback = ["fksegundo-rust", "ronieneubauer-rinha2026"]
          try:
              req = urllib.request.Request(url, headers={"User-Agent": "rinha4-back-end-dotnet-ci"})
              data = json.load(urllib.request.urlopen(req, timeout=30))

              rows = []
              for participant, submissions in data.items():
                  for submission_id, info in (submissions or {}).items():
                      scoring = info.get("scoring") or {}
                      score = scoring.get("final_score")
                      if isinstance(score, (int, float)):
                          repo = (info.get("repo_url") or "").rstrip("/").lower()
                          rows.append({
                              "score": float(score),
                              "p99": info.get("p99"),
                              "participant": participant,
                              "submission_id": submission_id,
                              "repo": repo,
                          })

              ours_repo = participants["jonathanperis"]["repo"].rstrip("/").lower()
              ours = next((r for r in rows if r["repo"] == ours_repo), None)
              known = []
              for key, meta in participants.items():
                  if key == "jonathanperis" or not meta["repo"]:
                      continue
                  repo = meta["repo"].rstrip("/").lower()
                  best = max((r for r in rows if r["repo"] == repo), key=lambda r: r["score"], default=None)
                  if best and (ours is None or best["score"] > ours["score"]):
                      known.append((best["score"], key, best))

              known.sort(reverse=True, key=lambda item: item[0])
              targets = [key for _, key, _ in known[:2]] or fallback
          except Exception as exc:
              print(f"ranking fetch failed, using fallback targets {fallback}: {exc}", file=sys.stderr)
              targets = fallback

          chosen = [participants["jonathanperis"]] + [participants[key] for key in targets]
          emit([{"name": row["name"], "compose_file": row["compose_file"]} for row in chosen])
          PY

  benchmark:
    name: ${{ matrix.participant.name }} benchmark
    needs: select-participants
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        participant: ${{ fromJSON(needs.select-participants.outputs.participants) }}

    permissions:
      contents: read

    steps:
      - name: Checkout
        if: ${{ inputs.compose_file == matrix.participant.compose_file || inputs.compose_file == 'all-comparison' }}
        uses: actions/checkout@v6

      - name: Show runner capacity
        if: ${{ inputs.compose_file == matrix.participant.compose_file || inputs.compose_file == 'all-comparison' }}
        run: |
          uname -a
          nproc
          free -h
          docker version
          docker compose version

      - name: Run benchmark
        if: ${{ inputs.compose_file == matrix.participant.compose_file || inputs.compose_file == 'all-comparison' }}
        env:
          COMPOSE_FILE: ${{ matrix.participant.compose_file }}
          OFFICIAL_REF: ${{ inputs.official_ref }}
          K6_IMAGE: ${{ inputs.k6_image }}
          WEBAPI_IMAGE: ${{ matrix.participant.name == 'jonathanperis' && inputs.webapi_image || '' }}
          BENCHMARK_PULL_IMAGE: "true"
          BENCHMARK_NO_BUILD: "true"
          BENCHMARK_STANDALONE_COMPOSE: "true"
          BENCHMARK_REPETITIONS: ${{ inputs.benchmark_repetitions }}
          RESULTS_DIR: benchmark-results-${{ matrix.participant.name }}
        run: |
          set -euo pipefail

          OFFICIAL_REPO="https://github.com/zanfranceschi/rinha-de-backend-2026.git"
          mkdir -p "$RESULTS_DIR"
          rm -rf "$RESULTS_DIR/official"

          if ! [[ "$BENCHMARK_REPETITIONS" =~ ^[0-9]+$ ]] || [[ "$BENCHMARK_REPETITIONS" -lt 1 ]]; then
            echo "BENCHMARK_REPETITIONS must be a positive integer" >&2
            exit 1
          fi

          compose_args=(--compatibility -f "$COMPOSE_FILE")

          cleanup() {
            docker compose "${compose_args[@]}" logs --no-color > "$RESULTS_DIR/docker-compose.log" 2>&1 || true
            docker compose "${compose_args[@]}" down --volumes --remove-orphans > /dev/null 2>&1 || true
          }
          trap cleanup EXIT

          echo "==> Fetching official Rinha test"
          git clone --depth 1 --branch "$OFFICIAL_REF" "$OFFICIAL_REPO" "$RESULTS_DIR/official"

          echo "==> Pulling published images"
          docker compose "${compose_args[@]}" pull

          echo "==> Starting stack"
          if [[ -n "${WEBAPI_IMAGE:-}" ]]; then
            echo "Using WEBAPI_IMAGE=$WEBAPI_IMAGE"
          fi
          docker compose "${compose_args[@]}" up -d --no-build

          echo "==> Waiting for /ready"
          for attempt in {1..20}; do
            if curl -fsS http://localhost:9999/ready > /dev/null 2>&1; then
              echo "Ready after attempt $attempt"
              break
            fi
            if [[ "$attempt" == "20" ]]; then
              echo "Service did not become ready" >&2
              exit 1
            fi
            sleep 3
          done

          echo "==> Running official k6 benchmark"
          chmod -R a+rwX "$RESULTS_DIR/official"
          repeat_files=()
          for repetition in $(seq 1 "$BENCHMARK_REPETITIONS"); do
            echo "==> k6 repetition $repetition/$BENCHMARK_REPETITIONS"
            rm -f "$RESULTS_DIR/official/test/results.json" "$RESULTS_DIR/official/test/k6-report.html"
            docker run --rm \
              --network host \
              --user "$(id -u):$(id -g)" \
              -e K6_NO_USAGE_REPORT=true \
              -e K6_WEB_DASHBOARD=true \
              -e K6_WEB_DASHBOARD_PORT=-1 \
              -e K6_WEB_DASHBOARD_EXPORT=test/k6-report.html \
              -v "$PWD/$RESULTS_DIR/official:/official" \
              -w /official \
              "$K6_IMAGE" run test/test.js

            result_file="$RESULTS_DIR/results-repetition-$repetition.json"
            cp "$RESULTS_DIR/official/test/results.json" "$result_file"
            repeat_files+=("$result_file")
            if [[ -f "$RESULTS_DIR/official/test/k6-report.html" ]]; then
              cp "$RESULTS_DIR/official/test/k6-report.html" "$RESULTS_DIR/k6-report-repetition-$repetition.html"
            fi
          done

          if [[ "$BENCHMARK_REPETITIONS" -eq 1 ]]; then
            cp "${repeat_files[0]}" "$RESULTS_DIR/results.json"
            if [[ -f "$RESULTS_DIR/k6-report-repetition-1.html" ]]; then
              cp "$RESULTS_DIR/k6-report-repetition-1.html" "$RESULTS_DIR/k6-report.html"
            fi
          else
            selected_repetition="$(jq -s '
              to_entries
              | sort_by((.value.p99 | sub("ms"; "") | tonumber))
              | .[((length - 1) / 2 | floor)].key + 1
            ' "${repeat_files[@]}")"
            cp "$RESULTS_DIR/results-repetition-$selected_repetition.json" "$RESULTS_DIR/results.json"
            if [[ -f "$RESULTS_DIR/k6-report-repetition-$selected_repetition.html" ]]; then
              cp "$RESULTS_DIR/k6-report-repetition-$selected_repetition.html" "$RESULTS_DIR/k6-report.html"
            fi
            jq -s --argjson selected_repetition "$selected_repetition" '{
              repetitions: length,
              selected: "median_by_p99",
              selected_repetition: $selected_repetition,
              p99_ms: (map(.p99 | sub("ms"; "") | tonumber) | sort | {min: .[0], median: .[((length - 1) / 2 | floor)], max: .[-1]}),
              final_score: (map(.scoring.final_score) | sort | {min: .[0], median: .[((length - 1) / 2 | floor)], max: .[-1]}),
              failure_rate: map(.scoring.failure_rate)
            }' "${repeat_files[@]}" > "$RESULTS_DIR/repetition-summary.json"
          fi

          jq . "$RESULTS_DIR/results.json"

      - name: Upload benchmark artifacts
        if: ${{ always() && (inputs.compose_file == matrix.participant.compose_file || inputs.compose_file == 'all-comparison') }}
        uses: actions/upload-artifact@v7
        with:
          name: rinha-benchmark-${{ matrix.participant.name }}-${{ github.run_number }}
          path: |
            benchmark-results-${{ matrix.participant.name }}/results.json
            benchmark-results-${{ matrix.participant.name }}/k6-report.html
            benchmark-results-${{ matrix.participant.name }}/k6-report-repetition-*.html
            benchmark-results-${{ matrix.participant.name }}/results-repetition-*.json
            benchmark-results-${{ matrix.participant.name }}/repetition-summary.json
            benchmark-results-${{ matrix.participant.name }}/docker-compose.log
            benchmark-results-${{ matrix.participant.name }}/docker-state-*.txt
          if-no-files-found: ignore
