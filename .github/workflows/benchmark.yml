name: Competitor Benchmark

on:
  push:
    branches:
      - comparison
    paths-ignore:
      - 'comparison-results/**'
  workflow_dispatch:
    inputs:
      compose_file:
        description: Compose file to benchmark
        required: true
        default: all-comparison
        type: choice
        options:
          - all-comparison
          - competitor-compose/jonathanperis/docker-compose.yml
          - competitor-compose/mxlange-c-api-rinha2026/docker-compose.yml
          - competitor-compose/ronieneubauer-rinha2026/docker-compose.yml
          - competitor-compose/daniloitagyba-rinha-2026-dotnet/docker-compose.yml
      official_ref:
        description: Rinha official repo ref
        required: true
        default: main
      k6_image:
        description: k6 Docker image
        required: true
        default: grafana/k6:latest
      webapi_image:
        description: Optional Jonathan Peris image override
        required: false
        default: ""
      benchmark_repetitions:
        description: Number of k6 repetitions
        required: true
        default: "1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark:
    name: ${{ matrix.participant.name }} benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        participant:
          # Small active comparison set:
          # - current #1 global target: MXLange/c-api-rinha2026, pinned Docker Hub digest
          # - tracked fast C competitor: RonieNeubauer/rinha2026, official issue #4682
          # - #1 .NET competitor: daniloitagyba/rinha-2026-dotnet, official issue #4746
          # - ours: jonathanperis/rinha4-back-end-dotnet
          - name: mxlange-c-api-rinha2026
            compose_file: competitor-compose/mxlange-c-api-rinha2026/docker-compose.yml
          - name: ronieneubauer-rinha2026
            compose_file: competitor-compose/ronieneubauer-rinha2026/docker-compose.yml
          - name: daniloitagyba-rinha-2026-dotnet
            compose_file: competitor-compose/daniloitagyba-rinha-2026-dotnet/docker-compose.yml
          - name: jonathanperis
            compose_file: competitor-compose/jonathanperis/docker-compose.yml

    permissions:
      contents: read

    steps:
      - name: Checkout
        if: ${{ github.event_name == 'push' || inputs.compose_file == matrix.participant.compose_file || inputs.compose_file == 'all-comparison' }}
        uses: actions/checkout@v6

      - name: Run benchmark
        if: ${{ github.event_name == 'push' || inputs.compose_file == matrix.participant.compose_file || inputs.compose_file == 'all-comparison' }}
        env:
          COMPOSE_FILE: ${{ matrix.participant.compose_file }}
          OFFICIAL_REF: ${{ inputs.official_ref || 'main' }}
          K6_IMAGE: ${{ inputs.k6_image || 'grafana/k6:latest' }}
          WEBAPI_IMAGE: ${{ matrix.participant.name == 'jonathanperis' && inputs.webapi_image || '' }}
          BENCHMARK_REPETITIONS: ${{ inputs.benchmark_repetitions || '1' }}
          RESULTS_DIR: benchmark-results-${{ matrix.participant.name }}
        run: |
          set -euo pipefail
          OFFICIAL_REPO="https://github.com/zanfranceschi/rinha-de-backend-2026.git"
          mkdir -p "$RESULTS_DIR"
          rm -rf "$RESULTS_DIR/official"
          git clone --depth 1 --branch "$OFFICIAL_REF" "$OFFICIAL_REPO" "$RESULTS_DIR/official"
          compose_args=(--compatibility -f "$COMPOSE_FILE")

          cleanup() {
            docker compose "${compose_args[@]}" logs --no-color > "$RESULTS_DIR/docker-compose.log" 2>&1 || true
            docker compose "${compose_args[@]}" down --volumes --remove-orphans > /dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker compose "${compose_args[@]}" pull
          docker compose "${compose_args[@]}" up -d --no-build
          for attempt in {1..20}; do
            if curl -fsS http://localhost:9999/ready > /dev/null 2>&1; then
              break
            fi
            if [[ "$attempt" == "20" ]]; then
              echo "Service did not become ready" >&2
              exit 1
            fi
            sleep 3
          done

          chmod -R a+rwX "$RESULTS_DIR/official"
          repeat_files=()
          for repetition in $(seq 1 "$BENCHMARK_REPETITIONS"); do
            rm -f "$RESULTS_DIR/official/test/results.json" "$RESULTS_DIR/official/test/k6-report.html"
            docker run --rm \
              --network host \
              --user "$(id -u):$(id -g)" \
              -e K6_NO_USAGE_REPORT=true \
              -e K6_WEB_DASHBOARD=true \
              -e K6_WEB_DASHBOARD_PORT=-1 \
              -e K6_WEB_DASHBOARD_EXPORT=test/k6-report.html \
              -v "$PWD/$RESULTS_DIR/official:/official" \
              -w /official \
              "$K6_IMAGE" run test/test.js
            result_file="$RESULTS_DIR/results-repetition-$repetition.json"
            cp "$RESULTS_DIR/official/test/results.json" "$result_file"
            repeat_files+=("$result_file")
            if [[ -f "$RESULTS_DIR/official/test/k6-report.html" ]]; then
              cp "$RESULTS_DIR/official/test/k6-report.html" "$RESULTS_DIR/k6-report-repetition-$repetition.html"
            fi
          done

          cp "${repeat_files[0]}" "$RESULTS_DIR/results.json"
          jq . "$RESULTS_DIR/results.json"

      - name: Upload benchmark artifacts
        if: ${{ always() && (github.event_name == 'push' || inputs.compose_file == matrix.participant.compose_file || inputs.compose_file == 'all-comparison') }}
        uses: actions/upload-artifact@v7
        with:
          name: rinha-benchmark-${{ matrix.participant.name }}-${{ github.run_number }}
          path: |
            benchmark-results-${{ matrix.participant.name }}/results.json
            benchmark-results-${{ matrix.participant.name }}/results-repetition-*.json
            benchmark-results-${{ matrix.participant.name }}/k6-report-*.html
            benchmark-results-${{ matrix.participant.name }}/docker-compose.log
          if-no-files-found: ignore

  summarize:
    name: summarize comparison results
    runs-on: ubuntu-latest
    needs: benchmark
    if: ${{ always() }}
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout comparison branch
        uses: actions/checkout@v6
        with:
          ref: comparison

      - name: Download benchmark artifacts
        uses: actions/download-artifact@v7
        with:
          path: comparison-results/artifacts

      - name: Write summary JSON
        run: |
          python3 - <<'PY'
          import json, os, pathlib, statistics
          root = pathlib.Path('comparison-results/artifacts')
          rows = []
          for p in sorted(root.glob('**/results.json')):
              try:
                  d = json.load(open(p))
              except Exception:
                  continue
              r = d.get('result') or d
              sc = r.get('scoring') or {}
              bd = sc.get('breakdown') or {}
              artifact = p.parent.name
              name = artifact.removeprefix('rinha-benchmark-').rsplit('-', 1)[0]
              rows.append({
                  'participant': name,
                  'p99': r.get('p99'),
                  'final_score': sc.get('final_score'),
                  'false_positive_detections': bd.get('false_positive_detections'),
                  'false_negative_detections': bd.get('false_negative_detections'),
                  'http_errors': bd.get('http_errors'),
                  'artifact': artifact,
              })
          rows.sort(key=lambda x: x['participant'])
          out = {
              'run_id': os.environ.get('GITHUB_RUN_ID'),
              'run_number': os.environ.get('GITHUB_RUN_NUMBER'),
              'head_sha': os.environ.get('GITHUB_SHA'),
              'event_name': os.environ.get('GITHUB_EVENT_NAME'),
              'results': rows,
          }
          pathlib.Path('comparison-results').mkdir(exist_ok=True)
          pathlib.Path('comparison-results/latest.json').write_text(json.dumps(out, indent=2, sort_keys=True) + '\n')
          pathlib.Path(f"comparison-results/run-{out['run_number']}.json").write_text(json.dumps(out, indent=2, sort_keys=True) + '\n')
          print(json.dumps(out, indent=2, sort_keys=True))
          PY

      - name: Commit summary
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add comparison-results/latest.json comparison-results/run-*.json
          git commit -m "ci: archive comparison benchmark [skip ci]" || exit 0
          git push
