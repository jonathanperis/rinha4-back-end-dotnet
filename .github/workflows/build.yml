name: Build and Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'scripts/sync-official-rinha-result.mjs'
      - '.github/workflows/pages.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      dotnet_version:
        description: ".NET build axis"
        required: true
        default: "10"
        type: choice
        options:
          - "10"
          - "11-preview4"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-amd64:
    name: Build amd64 (Production)
    runs-on: ubuntu-latest
    outputs:
      benchmark_image: ${{ steps.benchmark-image.outputs.image }}
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Semantic Version
        id: semver
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          latest=${latest#v}
          IFS='.' read -r major minor patch <<< "$latest"
          new_patch=$((patch + 1))
          version="v${major}.${minor}.${new_patch}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve .NET build axis
        id: dotnet-axis
        env:
          DOTNET_VERSION: ${{ inputs.dotnet_version || '10' }}
        run: |
          case "$DOTNET_VERSION" in
            10)
              echo "version=10" >> "$GITHUB_OUTPUT"
              echo "suffix=net10" >> "$GITHUB_OUTPUT"
              echo "sdk_image=mcr.microsoft.com/dotnet/sdk:10.0-alpine" >> "$GITHUB_OUTPUT"
              echo "aspnet_image=mcr.microsoft.com/dotnet/aspnet:10.0-alpine" >> "$GITHUB_OUTPUT"
              echo "tfm=net10.0" >> "$GITHUB_OUTPUT"
              ;;
            11-preview4)
              echo "version=11-preview4" >> "$GITHUB_OUTPUT"
              echo "suffix=net11-preview4" >> "$GITHUB_OUTPUT"
              echo "sdk_image=mcr.microsoft.com/dotnet/sdk:11.0.100-preview.4-alpine3.23-aot" >> "$GITHUB_OUTPUT"
              echo "aspnet_image=mcr.microsoft.com/dotnet/aspnet:11.0.0-preview.4-alpine3.23" >> "$GITHUB_OUTPUT"
              echo "tfm=net11.0" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported dotnet_version=$DOTNET_VERSION" >&2
              exit 1
              ;;
          esac

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ steps.dotnet-axis.outputs.version == '10' && github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.semver.outputs.version }},enable=${{ steps.dotnet-axis.outputs.version == '10' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=ci-${{ github.sha }},enable=${{ steps.dotnet-axis.outputs.version == '10' && github.event_name != 'pull_request' }}
            type=raw,value=${{ steps.dotnet-axis.outputs.suffix }}-ci-${{ github.sha }},enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=${{ steps.dotnet-axis.outputs.suffix }}-latest,enable=${{ github.event_name != 'pull_request' }}
            type=sha,enable=${{ steps.dotnet-axis.outputs.version == '10' }}

      - name: Build and push amd64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./src/WebApi/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DOTNET_SDK_IMAGE=${{ steps.dotnet-axis.outputs.sdk_image }}
            DOTNET_ASPNET_IMAGE=${{ steps.dotnet-axis.outputs.aspnet_image }}
            RINHA_TFM=${{ steps.dotnet-axis.outputs.tfm }}
            AOT=true
            EXTRA_OPTIMIZE=true
            BUILD_CONFIGURATION=Release
            IVF_CLUSTERS=512
            IVF_SCALE=10000
            CACHEBUST=${{ github.sha }}

      - name: Set benchmark image
        id: benchmark-image
        env:
          DOTNET_SUFFIX: ${{ steps.dotnet-axis.outputs.suffix }}
        run: |
          if [ "$DOTNET_SUFFIX" = "net10" ]; then
            echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${DOTNET_SUFFIX}-ci-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.semver.outputs.version }}
          name: ${{ steps.semver.outputs.version }}
          generate_release_notes: true

  build-arm64:
    name: Build arm64 (Local Testing)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[arm64]')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./src/WebApi/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-latest
          build-args: |
            AOT=true
            EXTRA_OPTIMIZE=true
            BUILD_CONFIGURATION=Release
            IVF_CLUSTERS=512
            IVF_SCALE=10000
            CACHEBUST=${{ github.sha }}

  benchmark-amd64:
    name: Benchmark amd64 image
    runs-on: ubuntu-latest
    needs: build-amd64
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    timeout-minutes: 45
    concurrency:
      group: benchmark-reports-main
      cancel-in-progress: false
    permissions:
      actions: write
      contents: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show runner capacity
        run: |
          uname -a
          nproc
          free -h
          docker version
          docker compose version

      - name: Install native k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
          k6 version

      - name: Run official-like benchmark against built image
        env:
          WEBAPI_IMAGE: ${{ needs.build-amd64.outputs.benchmark_image }}
          BENCHMARK_PULL_IMAGE: "true"
          BENCHMARK_NO_BUILD: "true"
          COMPOSE_FILE: docker-compose.yml
          OFFICIAL_REF: main
          K6_IMAGE: grafana/k6:latest
          BENCHMARK_K6_MODE: native
          RESULTS_DIR: benchmark-results
          IVF_CLUSTERS: "512"
          IVF_TRAIN_SAMPLE: "65536"
          IVF_ITERATIONS: "6"
          IVF_SCALE: "10000"
          IVF_FAST_NPROBE: "1"
          IVF_FULL_NPROBE: "1"
          IVF_BOUNDARY_FULL: "false"
          IVF_BBOX_REPAIR: "true"
          IVF_REPAIR_MIN_FRAUDS: "0"
          IVF_REPAIR_MAX_FRAUDS: "5"
          IVF_ZERO_FAST_APPROVE_WORST_DISTANCE: "5000000"
          IVF_FIVE_FAST_DENY_WORST_DISTANCE: "2000000"
          SCORER_MODE: ivf
          ACCEPT_LOOPS: "1"
          FD_RAW: "1"
          BENCHMARK_STACK_CPUSET: ""
        run: bash scripts/ci-official-benchmark.sh

      - name: Archive benchmark report
        env:
          RESULTS_JSON: benchmark-results/results.json
          K6_HTML_REPORT: benchmark-results/k6-report.html
          COMPOSE_LOG: benchmark-results/docker-compose.log
          BENCHMARK_IMAGE: ${{ needs.build-amd64.outputs.benchmark_image }}
          BENCHMARK_SHA: ${{ github.sha }}
          BENCHMARK_RUN_ID: ${{ github.run_id }}
          BENCHMARK_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BENCHMARK_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          COMPOSE_FILE: docker-compose.yml
          OFFICIAL_REF: main
          K6_IMAGE: grafana/k6:latest
          BENCHMARK_K6_MODE: native
          IVF_CLUSTERS: "512"
          IVF_TRAIN_SAMPLE: "65536"
          IVF_ITERATIONS: "6"
          IVF_SCALE: "10000"
          IVF_FAST_NPROBE: "1"
          IVF_FULL_NPROBE: "1"
          IVF_BOUNDARY_FULL: "false"
          IVF_BBOX_REPAIR: "true"
          IVF_REPAIR_MIN_FRAUDS: "0"
          IVF_REPAIR_MAX_FRAUDS: "5"
          IVF_ZERO_FAST_APPROVE_WORST_DISTANCE: "5000000"
          IVF_FIVE_FAST_DENY_WORST_DISTANCE: "2000000"
          SCORER_MODE: ivf
          ACCEPT_LOOPS: "1"
          FD_RAW: "1"
          BENCHMARK_STACK_CPUSET: ""
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          bash scripts/archive-benchmark-result.sh

      - name: Run calibrated benchmark against built image
        env:
          WEBAPI_IMAGE: ${{ needs.build-amd64.outputs.benchmark_image }}
          BENCHMARK_PULL_IMAGE: "true"
          BENCHMARK_NO_BUILD: "true"
          COMPOSE_FILE: docker-compose.yml
          OFFICIAL_REF: main
          K6_IMAGE: grafana/k6:latest
          BENCHMARK_K6_MODE: native
          RESULTS_DIR: benchmark-results-calibrated
          IVF_CLUSTERS: "512"
          IVF_TRAIN_SAMPLE: "65536"
          IVF_ITERATIONS: "6"
          IVF_SCALE: "10000"
          IVF_FAST_NPROBE: "1"
          IVF_FULL_NPROBE: "1"
          IVF_BOUNDARY_FULL: "false"
          IVF_BBOX_REPAIR: "true"
          IVF_REPAIR_MIN_FRAUDS: "0"
          IVF_REPAIR_MAX_FRAUDS: "5"
          IVF_ZERO_FAST_APPROVE_WORST_DISTANCE: "5000000"
          IVF_FIVE_FAST_DENY_WORST_DISTANCE: "2000000"
          SCORER_MODE: ivf
          ACCEPT_LOOPS: "1"
          FD_RAW: "1"
          BENCHMARK_API_CPUS: "0.425"
          BENCHMARK_PROXY_CPUS: "0.15"
          BENCHMARK_REPETITIONS: "1"
        run: bash scripts/ci-official-benchmark.sh

      - name: Archive calibrated benchmark report
        env:
          RESULTS_JSON: benchmark-results-calibrated/results.json
          K6_HTML_REPORT: benchmark-results-calibrated/k6-report.html
          COMPOSE_LOG: benchmark-results-calibrated/docker-compose.log
          BENCHMARK_IMAGE: ${{ needs.build-amd64.outputs.benchmark_image }}
          BENCHMARK_SHA: ${{ github.sha }}
          BENCHMARK_RUN_ID: ${{ github.run_id }}
          BENCHMARK_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BENCHMARK_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          BENCHMARK_REPORT_KIND: official-calibrated
          COMPOSE_FILE: docker-compose.yml
          OFFICIAL_REF: main
          K6_IMAGE: grafana/k6:latest
          BENCHMARK_K6_MODE: native
          IVF_CLUSTERS: "512"
          IVF_TRAIN_SAMPLE: "65536"
          IVF_ITERATIONS: "6"
          IVF_SCALE: "10000"
          IVF_FAST_NPROBE: "1"
          IVF_FULL_NPROBE: "1"
          IVF_BOUNDARY_FULL: "false"
          IVF_BBOX_REPAIR: "true"
          IVF_REPAIR_MIN_FRAUDS: "0"
          IVF_REPAIR_MAX_FRAUDS: "5"
          IVF_ZERO_FAST_APPROVE_WORST_DISTANCE: "5000000"
          IVF_FIVE_FAST_DENY_WORST_DISTANCE: "2000000"
          SCORER_MODE: ivf
          ACCEPT_LOOPS: "1"
          FD_RAW: "1"
          BENCHMARK_API_CPUS: "0.425"
          BENCHMARK_PROXY_CPUS: "0.15"
          BENCHMARK_REPETITIONS: "1"
        run: bash scripts/archive-benchmark-result.sh

      - name: Commit benchmark report
        id: commit-benchmark-report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/public/reports
          if git diff --cached --quiet; then
            echo "No benchmark report changes to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "docs: archive rinha benchmark"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh GitHub Pages report site
        if: steps.commit-benchmark-report.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rinha-benchmark-${{ github.sha }}
          path: |
            benchmark-results/results.json
            benchmark-results/k6-report.html
            benchmark-results/k6-output-repetition-*.json
            benchmark-results/results-repetition-*.json
            benchmark-results/k6-report-repetition-*.html
            benchmark-results/repetition-summary.json
            benchmark-results/docker-compose.log
            benchmark-results/docker-state-*.txt
            benchmark-results/docker-compose.calibration.yml
            benchmark-results-calibrated/results.json
            benchmark-results-calibrated/k6-report.html
            benchmark-results-calibrated/k6-output-repetition-*.json
            benchmark-results-calibrated/results-repetition-*.json
            benchmark-results-calibrated/k6-report-repetition-*.html
            benchmark-results-calibrated/repetition-summary.json
            benchmark-results-calibrated/docker-compose.log
            benchmark-results-calibrated/docker-state-*.txt
            benchmark-results-calibrated/docker-compose.calibration.yml
          if-no-files-found: ignore
