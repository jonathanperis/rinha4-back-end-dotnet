name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-amd64:
    name: Build amd64 (Production)
    runs-on: ubuntu-latest
    outputs:
      benchmark_image: ${{ steps.benchmark-image.outputs.image }}
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semantic Version
        id: semver
        if: github.event_name != 'pull_request'
        run: |
          latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          latest=${latest#v}
          IFS='.' read -r major minor patch <<< "$latest"
          new_patch=$((patch + 1))
          version="v${major}.${minor}.${new_patch}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.semver.outputs.version }},enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=ci-${{ github.sha }},enable=${{ github.event_name != 'pull_request' }}
            type=sha

      - name: Build and push amd64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/WebApi/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AOT=true
            EXTRA_OPTIMIZE=true
            BUILD_CONFIGURATION=Release
            CACHEBUST=${{ github.sha }}

      - name: Set benchmark image
        id: benchmark-image
        run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.semver.outputs.version }}
          name: ${{ steps.semver.outputs.version }}
          generate_release_notes: true

  build-arm64:
    name: Build arm64 (Local Testing)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[arm64]')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/WebApi/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-latest
          build-args: |
            AOT=true
            EXTRA_OPTIMIZE=true
            BUILD_CONFIGURATION=Release
            CACHEBUST=${{ github.sha }}

  benchmark-amd64:
    name: Benchmark amd64 image
    runs-on: ubuntu-latest
    needs: build-amd64
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    timeout-minutes: 45
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show runner capacity
        run: |
          uname -a
          nproc
          free -h
          docker version
          docker compose version

      - name: Run official-like benchmark against built image
        env:
          WEBAPI_IMAGE: ${{ needs.build-amd64.outputs.benchmark_image }}
          BENCHMARK_PULL_IMAGE: "true"
          BENCHMARK_NO_BUILD: "true"
          COMPOSE_FILE: docker-compose.yml
          OFFICIAL_REF: main
          K6_IMAGE: grafana/k6:latest
          RESULTS_DIR: benchmark-results
        run: bash scripts/ci-official-benchmark.sh

      - name: Archive benchmark report
        env:
          RESULTS_JSON: benchmark-results/results.json
          COMPOSE_LOG: benchmark-results/docker-compose.log
          BENCHMARK_IMAGE: ${{ needs.build-amd64.outputs.benchmark_image }}
          BENCHMARK_SHA: ${{ github.sha }}
          BENCHMARK_RUN_ID: ${{ github.run_id }}
          BENCHMARK_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BENCHMARK_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          COMPOSE_FILE: docker-compose.yml
          OFFICIAL_REF: main
          K6_IMAGE: grafana/k6:latest
        run: bash scripts/archive-benchmark-result.sh

      - name: Commit benchmark report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/public/reports
          if git diff --cached --quiet; then
            echo "No benchmark report changes to commit"
          else
            git commit -m "docs: archive rinha benchmark [skip ci]"
            git push
          fi

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rinha-benchmark-${{ github.sha }}
          path: |
            benchmark-results/results.json
            benchmark-results/docker-compose.log
          if-no-files-found: ignore
