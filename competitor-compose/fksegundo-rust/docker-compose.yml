version: "3.9"
services:
  api1:
    image: ghcr.io/fksegundo/rinha-rust-api:sha-3376bed
    pull_policy: always
    restart: always
    network_mode: "none"
    logging:
      driver: "none"
    environment:
      RINHA_FD_SOCKET: /sockets/api1.sock
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165M"

  api2:
    image: ghcr.io/fksegundo/rinha-rust-api:sha-3376bed
    pull_policy: always
    restart: always
    network_mode: "none"
    logging:
      driver: "none"
    environment:
      RINHA_FD_SOCKET: /sockets/api2.sock
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165M"

  lb:
    image: ghcr.io/fksegundo/rinha-api-lb:sha-0c6f3b2
    pull_policy: always
    restart: always
    user: "0:0"
    ports:
      - "9999:9999"
    environment:
      PORT: "9999"
      FD_UPSTREAMS: /sockets/api1.sock,/sockets/api2.sock
      WORKERS: "2"
    logging:
      driver: "none"
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "20M"
    depends_on:
      - api1
      - api2

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=10m
