services:
  api1:
    image: ghcr.io/gb/jvmoonshot-xxvi:v27
    pull_policy: always
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "167M"

  api2:
    image: ghcr.io/gb/jvmoonshot-xxvi:v27
    pull_policy: always
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "167M"

  lb:
    image: ghcr.io/gb/lapada:v19
    pull_policy: always
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "16M"

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=10m
