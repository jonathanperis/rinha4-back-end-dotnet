services:
  api1: &api
    image: vhpcavalcanti/rinha-backend-2026-api:0.0.10
    environment:
      - SOCKET_PATH=/run/sock/api1.sock
    volumes:
      - sock-vol:/run/sock
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "160MB"
    security_opt:
      - seccomp:unconfined

  api2:
    <<: *api
    environment:
      - SOCKET_PATH=/run/sock/api2.sock

  lb:
    image: vhpcavalcanti/so-no-forevis:0.0.1
    security_opt:
      - seccomp:unconfined
    environment:
      - PORT=9999
      - UPSTREAMS=/run/sock/api1.sock,/run/sock/api2.sock
    ports:
      - "9999:9999"
    volumes:
      - sock-vol:/run/sock
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "30MB"

volumes:
  sock-vol:
