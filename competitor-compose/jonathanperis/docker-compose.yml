name: rinha-2026-jonathanperis

services:
  webapi1: &webapi
    image: ${WEBAPI_IMAGE:-ghcr.io/jonathanperis/rinha4-back-end-dotnet:ci-fdce0e1bad3733a6f366bce5bcf48a0dbf293c03}
    pull_policy: always
    platform: linux/amd64
    user: root
    restart: always
    read_only: true
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
      DOTNET_PROCESSOR_COUNT: "1"
      DOTNET_SYSTEM_NET_SOCKETS_INLINE_COMPLETIONS: "1"
      DOTNET_SYSTEM_NET_SOCKETS_THREAD_COUNT: "1"
      ACCEPT_LOOPS: "2"
      MIN_WORKER_THREADS: "128"
      SCORER_MODE: hybrid
      SOCKET_PATH: /sockets/api1.sock
      DATA_DIR: /data
      EXACT_PATH: /data/references.bin
      IVF_PATH: /data/references.ivf.bin
      IVF_FAST_NPROBE: "1"
      IVF_FULL_NPROBE: "1"
      IVF_BOUNDARY_FULL: "false"
      IVF_BBOX_REPAIR: "true"
      IVF_REPAIR_MIN_FRAUDS: "0"
      IVF_REPAIR_MAX_FRAUDS: "5"
      IVF_ZERO_FAST_APPROVE_WORST_DISTANCE: "5000000"
      IVF_FIVE_FAST_DENY_WORST_DISTANCE: "4000000"
      BUCKET_PATH: /data/references.bucket.bin
      BUCKET_EARLY_CANDIDATES: "9800"
      BUCKET_MIN_CANDIDATES: "16150"
      BUCKET_MAX_CANDIDATES: "24200"
      BUCKET_PROFILE_FASTPATH: "true"
      BUCKET_REFERENCE_FASTPATH: "true"
      BUCKET_REFERENCE_FASTPATH_LEGIT: "false"
      BUCKET_REFERENCE_FASTPATH_FRAUD: "true"
      BUCKET_REFERENCE_FASTPATH2_LEGIT: "true"
      BUCKET_REFERENCE_FASTPATH2_FRAUD: "true"
      BUCKET_PROFILE_LEGIT_MIN_COUNT: "5"
      BUCKET_PROFILE_FRAUD_MIN_COUNT: "15"
      BUCKET_EXACT_FALLBACK: "risky"
      BUCKET_AVX_CUTOFF_DIMS: "6"
    tmpfs:
      - /tmp
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD-SHELL", "test -S \"$${SOCKET_PATH}\""]
      interval: 100ms
      timeout: 100ms
      retries: 100
      start_period: 1s
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "165MB"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  webapi2:
    <<: *webapi
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
      DOTNET_PROCESSOR_COUNT: "1"
      DOTNET_SYSTEM_NET_SOCKETS_INLINE_COMPLETIONS: "1"
      DOTNET_SYSTEM_NET_SOCKETS_THREAD_COUNT: "1"
      ACCEPT_LOOPS: "2"
      MIN_WORKER_THREADS: "128"
      SCORER_MODE: hybrid
      SOCKET_PATH: /sockets/api2.sock
      DATA_DIR: /data
      EXACT_PATH: /data/references.bin
      IVF_PATH: /data/references.ivf.bin
      IVF_FAST_NPROBE: "1"
      IVF_FULL_NPROBE: "1"
      IVF_BOUNDARY_FULL: "false"
      IVF_BBOX_REPAIR: "true"
      IVF_REPAIR_MIN_FRAUDS: "0"
      IVF_REPAIR_MAX_FRAUDS: "5"
      IVF_ZERO_FAST_APPROVE_WORST_DISTANCE: "5000000"
      IVF_FIVE_FAST_DENY_WORST_DISTANCE: "4000000"
      BUCKET_PATH: /data/references.bucket.bin
      BUCKET_EARLY_CANDIDATES: "9800"
      BUCKET_MIN_CANDIDATES: "16150"
      BUCKET_MAX_CANDIDATES: "24200"
      BUCKET_PROFILE_FASTPATH: "true"
      BUCKET_REFERENCE_FASTPATH: "true"
      BUCKET_REFERENCE_FASTPATH_LEGIT: "false"
      BUCKET_REFERENCE_FASTPATH_FRAUD: "true"
      BUCKET_REFERENCE_FASTPATH2_LEGIT: "true"
      BUCKET_REFERENCE_FASTPATH2_FRAUD: "true"
      BUCKET_PROFILE_LEGIT_MIN_COUNT: "5"
      BUCKET_PROFILE_FRAUD_MIN_COUNT: "15"
      BUCKET_EXACT_FALLBACK: "risky"
      BUCKET_AVX_CUTOFF_DIMS: "6"

  lb:
    image: jrblatt/so-no-forevis:v0.0.2
    pull_policy: always
    platform: linux/amd64
    user: root
    security_opt:
      - seccomp=unconfined
    environment:
      UPSTREAMS: /sockets/api1.sock,/sockets/api2.sock
      PORT: "9999"
      BUF_SIZE: "4096"
      WORKERS: "1"
    volumes:
      - sockets:/sockets
    depends_on:
      webapi1:
        condition: service_healthy
      webapi2:
        condition: service_healthy
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20MB"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=4m,mode=0777
