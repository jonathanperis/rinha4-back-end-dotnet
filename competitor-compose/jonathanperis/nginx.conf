user root;
worker_processes 1;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log crit;

events {
    worker_connections 32768;
    use epoll;
    multi_accept on;
}

stream {
    access_log off;

    upstream api {
        server unix:/sockets/api1.sock max_conns=3000;
        server unix:/sockets/api2.sock max_conns=3000;
    }

    server {
        listen 9999 backlog=8192 reuseport;
        proxy_pass api;
        proxy_connect_timeout 200ms;
        proxy_next_upstream on;
        proxy_next_upstream_tries 2;
        proxy_timeout 2s;
        tcp_nodelay on;
    }
}
