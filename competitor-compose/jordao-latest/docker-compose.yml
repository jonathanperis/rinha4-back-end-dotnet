# Local dev compose matching the submission layout.
# Uses the same LB (so-no-forevis) and resource limits as the contest,
# but points API images at the local build (rinha/api:latest) and mounts
# data/ for faster iteration.

services:
  lb:
    image: jrblatt/so-no-forevis:v1.0.0
    pull_policy: always
    restart: always
    depends_on:
      - api1
      - api2
    environment:
      - UPSTREAMS=/run/sock/api1.sock,/run/sock/api2.sock
      - PORT=9999
      - BUF_SIZE=4096
      - WORKERS=1
    ports:
      - "9999:9999"
    volumes:
      - sock:/run/sock
    cpuset: "0"
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "25MB"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    security_opt:
      - seccomp:unconfined
    networks:
      - rinha

  api1:
    image: ghcr.io/jordaogustavo/rinha-api:latest
    environment:
      - SOCKET_PATH=/run/sock/api1.sock
      - CUSTOM_HTTP=1
      - FD_PASSING=1
      - NPROBE_FULL=5
      - PROFILE_MIN_COUNT=15
      - UNANIMITY_SKIP=1
      - DETERMINISTIC_SKIP=1
      - SERVER_TIMING=${SERVER_TIMING:-0}
    volumes:
      - sock:/run/sock
    cpuset: "1"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "162.5MB"
    security_opt:
      - seccomp:unconfined
    networks:
      - rinha

  api2:
    image: ghcr.io/jordaogustavo/rinha-api:latest
    environment:
      - SOCKET_PATH=/run/sock/api2.sock
      - CUSTOM_HTTP=1
      - FD_PASSING=1
      - NPROBE_FULL=5
      - PROFILE_MIN_COUNT=15
      - UNANIMITY_SKIP=1
      - DETERMINISTIC_SKIP=1
      - SERVER_TIMING=${SERVER_TIMING:-0}
    volumes:
      - sock:/run/sock
    cpuset: "3"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "162.5MB"
    security_opt:
      - seccomp:unconfined
    networks:
      - rinha

volumes:
  sock:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=1m,nr_inodes=8,mode=0777,noatime,nosuid,nodev"

networks:
  rinha:
    driver: bridge
