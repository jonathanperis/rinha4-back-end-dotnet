global
    maxconn 20000
    nbthread 1
    hard-stop-after 1s

defaults
    mode tcp
    maxconn 20000
    timeout connect 200ms
    timeout client 5s
    timeout server 5s
    option splice-auto
    option dontlognull
    option tcpka
    no log

frontend rinha_front
    bind *:9999
    default_backend rinha_api

backend rinha_api
    balance roundrobin
    server api1 unix@/run/sock/api1.sock maxconn 10000
    server api2 unix@/run/sock/api2.sock maxconn 10000
