x-api-common: &api-common
  image: ghcr.io/macedot/rinha-2026-c:0.1.1
  volumes:
    - rinha-c-sock:/run/sock
  networks:
    - rinha-c-net
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  deploy:
    resources:
      limits:
        cpus: "0.4"
        memory: "150M"
  environment: &api-env
    INDEX_PATH: "/app/resources/index.bin"
    UDS_PATH: "/run/sock/api.sock"
    UDS_MODE: "666"
    UNLINK_UDS: "1"
    IVF_NPROBE: "5"
    IVF_FULL_NPROBE: "24"
    CANDIDATES: "0"
  security_opt:
    - seccomp:unconfined

services:
  lb:
    image: jrblatt/so-no-forevis:v1.0.0
    restart: always
    depends_on:
      - api1
      - api2
    environment:
      - UPSTREAMS=/run/sock/api1.sock,/run/sock/api2.sock
      - PORT=9999
      - BUF_SIZE=4096
      - WORKERS=1
    ports:
      - "9999:9999"
    volumes:
      - rinha-c-sock:/run/sock
    networks:
      - rinha-c-net
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "30M"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    security_opt:
      - seccomp:unconfined

  api1:
    <<: *api-common
    environment:
      <<: *api-env
      UDS_PATH: "/run/sock/api1.sock"

  api2:
    <<: *api-common
    environment:
      <<: *api-env
      UDS_PATH: "/run/sock/api2.sock"

networks:
  rinha-c-net:
    driver: bridge

volumes:
  rinha-c-sock:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=10m
