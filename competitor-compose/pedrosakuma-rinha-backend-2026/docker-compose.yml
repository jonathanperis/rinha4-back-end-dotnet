name: rinha-backend-2026-pedro

services:
  api1: &api
    image: ghcr.io/pedrosakuma/rinha-backend-2026-api:wave46-hs5k-cb7b478
    pull_policy: always
    cpuset: "0,1"
    security_opt:
      - seccomp=unconfined
    environment:
      UDS_PATH: "/run/uds/api1.sock"
      DOTNET_PROCESSOR_COUNT: "1"
      TP_MIN_WORKERS: "64"
      TP_MAX_WORKERS: "64"
      SCORER: "ivf-blocked"
      IVF_BLOCKED_NPROBE: "1"
      IVF_BLOCKED_EARLY_EXIT_DIST: "0.020"
      RAW_HTTP: "1"
      RAW_HTTP_FDPASS: "1"
      RAW_HTTP_WORKERS: "1"
      RAW_HTTP_KEEPALIVE_MAX: "0"
      IO_URING_ENABLED: "0"
    networks: [app]
    volumes:
      - uds:/run/uds
    ulimits:
      memlock: -1
      nofile: 65536
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: "150MB"

  api2:
    <<: *api
    cpuset: "2,3"
    environment:
      UDS_PATH: "/run/uds/api2.sock"
      DOTNET_PROCESSOR_COUNT: "1"
      TP_MIN_WORKERS: "64"
      TP_MAX_WORKERS: "64"
      SCORER: "ivf-blocked"
      IVF_BLOCKED_NPROBE: "1"
      IVF_BLOCKED_EARLY_EXIT_DIST: "0.020"
      RAW_HTTP: "1"
      RAW_HTTP_FDPASS: "1"
      RAW_HTTP_WORKERS: "1"
      RAW_HTTP_KEEPALIVE_MAX: "0"
      IO_URING_ENABLED: "0"
    depends_on:
      - api1

  lb:
    image: jrblatt/so-no-forevis:v1.0.0
    pull_policy: always
    cpuset: "0,1,2,3"
    security_opt:
      - seccomp=unconfined
    environment:
      PORT: "9999"
      UPSTREAMS: "/run/uds/api1.sock,/run/uds/api2.sock"
      BUF_SIZE: "4096"
      WORKERS: "2"
    ports:
      - "9999:9999"
    volumes:
      - uds:/run/uds
    depends_on:
      - api1
      - api2
    networks: [app]
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "30MB"

volumes:
  uds:
    driver_opts:
      type: tmpfs
      device: tmpfs

networks:
  app:
    driver: bridge
