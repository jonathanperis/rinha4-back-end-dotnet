services:
  webapi1:
    cpuset: "0"
    security_opt:
      - seccomp=unconfined
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "160MB"

  webapi2:
    cpuset: "1"
    security_opt:
      - seccomp=unconfined
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "160MB"

  lb:
    image: ${LB_IMAGE:-ghcr.io/jonathanperis/rinha4-lb-yolo-mode:ci-8c26d383009b95afbd03c6cec33188aa75e4f311}
    container_name: rinha-lb
    pull_policy: always
    platform: linux/amd64
    cpuset: "2,3"
    user: root
    restart: always
    environment:
      LB_MODE: "proxy"
      PORT: "9999"
      UPSTREAMS: "/sockets/api1.sock,/sockets/api2.sock"
    volumes:
      - sockets:/sockets
    depends_on:
      - webapi1
      - webapi2
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.16"
          memory: "30MB"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    security_opt:
      - seccomp=unconfined
