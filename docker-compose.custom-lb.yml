services:
  webapi1:
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160MB"

  webapi2:
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160MB"

  nginx:
    image: jrblatt/so-no-forevis:v0.0.2
    container_name: custom-lb
    user: root
    environment:
      UPSTREAMS: /sockets/api1.sock,/sockets/api2.sock
      PORT: "9999"
      BUF_SIZE: "4096"
      WORKERS: "1"
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "30MB"
