services:
  webapi1:
    environment:
      BIND_ADDR: fd:/sockets/api1.sock.ctrl
    deploy:
      resources:
        limits:
          cpus: "0.44"

  webapi2:
    environment:
      BIND_ADDR: fd:/sockets/api2.sock.ctrl
    deploy:
      resources:
        limits:
          cpus: "0.44"

  lb:
    image: ${LB_IMAGE:-ghcr.io/jonathanperis/rinha4-lb-yolo-mode:ci-b5b0e375ca9c9c39152950ddffbbc5ce6a7bd92e}
    environment:
      LB_MODE: "fdpass"
      UPSTREAMS: "/sockets/api1.sock.ctrl,/sockets/api2.sock.ctrl"
    deploy:
      resources:
        limits:
          cpus: "0.12"
