services:
  webapi1:
    environment:
      BIND_ADDR: fd:/sockets/api1.sock.ctrl
    deploy:
      resources:
        limits:
          cpus: "0.44"

  webapi2:
    environment:
      BIND_ADDR: fd:/sockets/api2.sock.ctrl
    deploy:
      resources:
        limits:
          cpus: "0.44"

  lb:
    image: ${LB_IMAGE:-ghcr.io/jonathanperis/rinha4-lb-yolo-mode:ci-a2de791730f5df352aa90c87e2f1f65406a8d9cc}
    environment:
      LB_MODE: "fdpass"
      UPSTREAMS: "/sockets/api1.sock.ctrl,/sockets/api2.sock.ctrl"
    deploy:
      resources:
        limits:
          cpus: "0.12"
