services:
  webapi1:
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160MB"

  webapi2:
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160MB"

  lb:
    image: jrblatt/so-no-forevis:v0.0.2
    container_name: rinha-lb
    platform: linux/amd64
    restart: always
    depends_on:
      webapi1:
        condition: service_healthy
      webapi2:
        condition: service_healthy
    environment:
      UPSTREAMS: /sockets/api1.sock,/sockets/api2.sock
      PORT: "9999"
      BUF_SIZE: "4096"
      WORKERS: "1"
    ports:
      - "9999:9999"
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "30MB"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    security_opt:
      - seccomp=unconfined
