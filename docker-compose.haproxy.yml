services:
  lb:
    image: haproxy:3.1-alpine
    container_name: rinha-lb
    user: root
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets
    depends_on:
      webapi1:
        condition: service_healthy
      webapi2:
        condition: service_healthy
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "16MB"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
