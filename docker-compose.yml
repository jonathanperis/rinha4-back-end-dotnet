name: 'rinha-2026-dotnet'

services:
  webapi1: &webapi
    image: ghcr.io/jonathanperis/rinha4-back-end-dotnet:ci-1408179ddd8da853bbb22b87c3093d710bf5baab
    pull_policy: always
    container_name: webapi-1
    user: root
    restart: always
    read_only: true
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
      DOTNET_PROCESSOR_COUNT: "1"
      DOTNET_SYSTEM_NET_SOCKETS_INLINE_COMPLETIONS: "1"
      DOTNET_SYSTEM_NET_SOCKETS_THREAD_COUNT: "1"
      ACCEPT_LOOPS: "2"
      MIN_WORKER_THREADS: "128"
      SCORER_MODE: bucket
      SOCKET_PATH: /sockets/api1.sock
      DATA_DIR: /data
      BUCKET_PATH: /data/references.bucket.bin
      BUCKET_EARLY_CANDIDATES: "9800"
      BUCKET_MIN_CANDIDATES: "16150"
      BUCKET_MAX_CANDIDATES: "24200"
      BUCKET_PROFILE_FASTPATH: "true"
      BUCKET_PROFILE_LEGIT_MIN_COUNT: "5"
      BUCKET_PROFILE_FRAUD_MIN_COUNT: "15"
      BUCKET_EXACT_FALLBACK: risky
    tmpfs:
      - /tmp
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD-SHELL", "test -S \"$${SOCKET_PATH}\""]
      interval: 100ms
      timeout: 100ms
      retries: 100
      start_period: 1s
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "165MB"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  webapi2:
    <<: *webapi
    container_name: webapi-2
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
      DOTNET_PROCESSOR_COUNT: "1"
      DOTNET_SYSTEM_NET_SOCKETS_INLINE_COMPLETIONS: "1"
      DOTNET_SYSTEM_NET_SOCKETS_THREAD_COUNT: "1"
      ACCEPT_LOOPS: "2"
      MIN_WORKER_THREADS: "128"
      SCORER_MODE: bucket
      SOCKET_PATH: /sockets/api2.sock
      DATA_DIR: /data
      BUCKET_PATH: /data/references.bucket.bin
      BUCKET_EARLY_CANDIDATES: "9800"
      BUCKET_MIN_CANDIDATES: "16150"
      BUCKET_MAX_CANDIDATES: "24200"
      BUCKET_PROFILE_FASTPATH: "true"
      BUCKET_PROFILE_LEGIT_MIN_COUNT: "5"
      BUCKET_PROFILE_FRAUD_MIN_COUNT: "15"
      BUCKET_EXACT_FALLBACK: risky

  haproxy:
    image: haproxy:3.1-alpine
    container_name: haproxy-lb
    user: root
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets
    depends_on:
      webapi1:
        condition: service_healthy
      webapi2:
        condition: service_healthy
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "16MB"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=4m,mode=0777
