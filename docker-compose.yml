name: 'rinha-2026-dotnet'

services:
  webapi1: &webapi
    build:
      context: .
      dockerfile: ./src/WebApi/Dockerfile
      args:
        AOT: true
        EXTRA_OPTIMIZE: true
        BUILD_CONFIGURATION: Release
    container_name: webapi-1
    user: root
    restart: always
    read_only: true
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
      SOCKET_PATH: /sockets/api1.sock
      DATA_PATH: /data/references.bin
    tmpfs:
      - /tmp
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

  webapi2:
    <<: *webapi
    container_name: webapi-2
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
      SOCKET_PATH: /sockets/api2.sock
      DATA_PATH: /data/references.bin
    tmpfs:
      - /tmp
    volumes:
      - sockets:/sockets

  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    user: root
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    depends_on:
      - webapi1
      - webapi2
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20MB"

volumes:
  sockets:
    driver: local
