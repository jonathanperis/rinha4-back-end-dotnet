name: 'rinha-2026-dotnet'

services:
  webapi1: &webapi
    image: ghcr.io/jonathanperis/rinha4-back-end-dotnet:ci-a208b89272aa60f2b4e11a89ca6397a1ee998148
    pull_policy: always
    container_name: webapi-1
    user: root
    restart: always
    read_only: true
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
      DOTNET_PROCESSOR_COUNT: "1"
      DOTNET_SYSTEM_NET_SOCKETS_INLINE_COMPLETIONS: "1"
      DOTNET_SYSTEM_NET_SOCKETS_THREAD_COUNT: "1"
      ACCEPT_LOOPS: "1"
      MIN_WORKER_THREADS: "128"
      SCORER_MODE: ivf
      IVF_FAST_NPROBE: "1"
      IVF_FULL_NPROBE: "1"
      IVF_BOUNDARY_FULL: "false"
      IVF_BBOX_REPAIR: "true"
      IVF_REPAIR_MIN_FRAUDS: "0"
      IVF_REPAIR_MAX_FRAUDS: "5"
      SOCKET_PATH: /sockets/api1.sock
      DATA_DIR: /data
      IVF_PATH: /data/references.ivf.bin
    tmpfs:
      - /tmp
    volumes:
      - sockets:/sockets
    cpuset: "1,2"
    healthcheck:
      test: ["CMD-SHELL", "test -S \"$${SOCKET_PATH}\""]
      interval: 100ms
      timeout: 100ms
      retries: 100
      start_period: 1s
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "165MB"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  webapi2:
    <<: *webapi
    container_name: webapi-2
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
      DOTNET_PROCESSOR_COUNT: "1"
      DOTNET_SYSTEM_NET_SOCKETS_INLINE_COMPLETIONS: "1"
      DOTNET_SYSTEM_NET_SOCKETS_THREAD_COUNT: "1"
      ACCEPT_LOOPS: "1"
      MIN_WORKER_THREADS: "128"
      SCORER_MODE: ivf
      IVF_FAST_NPROBE: "1"
      IVF_FULL_NPROBE: "1"
      IVF_BOUNDARY_FULL: "false"
      IVF_BBOX_REPAIR: "true"
      IVF_REPAIR_MIN_FRAUDS: "0"
      IVF_REPAIR_MAX_FRAUDS: "5"
      SOCKET_PATH: /sockets/api2.sock
      DATA_DIR: /data
      IVF_PATH: /data/references.ivf.bin
    cpuset: "2,3"

  nginx:
    image: nginx:latest
    container_name: nginx-lb
    user: root
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    depends_on:
      webapi1:
        condition: service_healthy
      webapi2:
        condition: service_healthy
    ports:
      - "9999:9999"
    cpuset: "0"
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20MB"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=4m,mode=0777
