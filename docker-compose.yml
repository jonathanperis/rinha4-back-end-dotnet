name: 'rinha-2026-dotnet'

services:
  webapi1: &webapi
    image: ${WEBAPI_IMAGE:-ghcr.io/jonathanperis/rinha4-back-end-dotnet:latest}
    build:
      context: .
      dockerfile: ./src/WebApi/Dockerfile
      args:
        AOT: true
        EXTRA_OPTIMIZE: true
        BUILD_CONFIGURATION: Release
        EXACT_MAX_REFS: ${EXACT_MAX_REFS:-100000}
        IVF_CLUSTERS: ${IVF_CLUSTERS:-2048}
        IVF_TRAIN_SAMPLE: ${IVF_TRAIN_SAMPLE:-65536}
        IVF_ITERATIONS: ${IVF_ITERATIONS:-6}
        IVF_SCALE: ${IVF_SCALE:-10000}
    container_name: webapi-1
    user: root
    restart: always
    read_only: true
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
      DOTNET_PROCESSOR_COUNT: "1"
      DOTNET_SYSTEM_NET_SOCKETS_INLINE_COMPLETIONS: "1"
      DOTNET_SYSTEM_NET_SOCKETS_THREAD_COUNT: "1"
      ACCEPT_LOOPS: "${ACCEPT_LOOPS:-2}"
      MIN_WORKER_THREADS: "${MIN_WORKER_THREADS:-128}"
      SCORER_MODE: "${SCORER_MODE:-ivf}"
      SOCKET_PATH: /sockets/api1.sock
      DATA_DIR: /data
      EXACT_PATH: /data/references.bin
      IVF_PATH: /data/references.ivf.bin
      IVF_FAST_NPROBE: "${IVF_FAST_NPROBE:-1}"
      IVF_FULL_NPROBE: "${IVF_FULL_NPROBE:-1}"
      IVF_BOUNDARY_FULL: "${IVF_BOUNDARY_FULL:-false}"
      IVF_BBOX_REPAIR: "${IVF_BBOX_REPAIR:-true}"
      IVF_REPAIR_MIN_FRAUDS: "${IVF_REPAIR_MIN_FRAUDS:-0}"
      IVF_REPAIR_MAX_FRAUDS: "${IVF_REPAIR_MAX_FRAUDS:-5}"
      IVF_ZERO_FAST_APPROVE_WORST_DISTANCE: "${IVF_ZERO_FAST_APPROVE_WORST_DISTANCE:-5000000}"
      IVF_FIVE_FAST_DENY_WORST_DISTANCE: "${IVF_FIVE_FAST_DENY_WORST_DISTANCE:-4500000}"
      BUCKET_PATH: /data/references.bucket.bin
      BUCKET_EARLY_CANDIDATES: "${BUCKET_EARLY_CANDIDATES:-9800}"
      BUCKET_MIN_CANDIDATES: "${BUCKET_MIN_CANDIDATES:-16150}"
      BUCKET_MAX_CANDIDATES: "${BUCKET_MAX_CANDIDATES:-24200}"
      BUCKET_PROFILE_FASTPATH: "${BUCKET_PROFILE_FASTPATH:-true}"
      BUCKET_PROFILE_LEGIT_MIN_COUNT: "${BUCKET_PROFILE_LEGIT_MIN_COUNT:-5}"
      BUCKET_PROFILE_FRAUD_MIN_COUNT: "${BUCKET_PROFILE_FRAUD_MIN_COUNT:-15}"
      BUCKET_EXACT_FALLBACK: "${BUCKET_EXACT_FALLBACK:-risky}"
    tmpfs:
      - /tmp
    volumes:
      - sockets:/sockets
    cpuset: "1,2"
    healthcheck:
      test: ["CMD-SHELL", "test -S \"$${SOCKET_PATH}\""]
      interval: 100ms
      timeout: 100ms
      retries: 100
      start_period: 1s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  webapi2:
    <<: *webapi
    container_name: webapi-2
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
      DOTNET_PROCESSOR_COUNT: "1"
      DOTNET_SYSTEM_NET_SOCKETS_INLINE_COMPLETIONS: "1"
      DOTNET_SYSTEM_NET_SOCKETS_THREAD_COUNT: "1"
      ACCEPT_LOOPS: "${ACCEPT_LOOPS:-2}"
      MIN_WORKER_THREADS: "${MIN_WORKER_THREADS:-128}"
      SCORER_MODE: "${SCORER_MODE:-ivf}"
      SOCKET_PATH: /sockets/api2.sock
      DATA_DIR: /data
      EXACT_PATH: /data/references.bin
      IVF_PATH: /data/references.ivf.bin
      IVF_FAST_NPROBE: "${IVF_FAST_NPROBE:-1}"
      IVF_FULL_NPROBE: "${IVF_FULL_NPROBE:-1}"
      IVF_BOUNDARY_FULL: "${IVF_BOUNDARY_FULL:-false}"
      IVF_BBOX_REPAIR: "${IVF_BBOX_REPAIR:-true}"
      IVF_REPAIR_MIN_FRAUDS: "${IVF_REPAIR_MIN_FRAUDS:-0}"
      IVF_REPAIR_MAX_FRAUDS: "${IVF_REPAIR_MAX_FRAUDS:-5}"
      IVF_ZERO_FAST_APPROVE_WORST_DISTANCE: "${IVF_ZERO_FAST_APPROVE_WORST_DISTANCE:-5000000}"
      IVF_FIVE_FAST_DENY_WORST_DISTANCE: "${IVF_FIVE_FAST_DENY_WORST_DISTANCE:-4500000}"
      BUCKET_PATH: /data/references.bucket.bin
      BUCKET_EARLY_CANDIDATES: "${BUCKET_EARLY_CANDIDATES:-9800}"
      BUCKET_MIN_CANDIDATES: "${BUCKET_MIN_CANDIDATES:-16150}"
      BUCKET_MAX_CANDIDATES: "${BUCKET_MAX_CANDIDATES:-24200}"
      BUCKET_PROFILE_FASTPATH: "${BUCKET_PROFILE_FASTPATH:-true}"
      BUCKET_PROFILE_LEGIT_MIN_COUNT: "${BUCKET_PROFILE_LEGIT_MIN_COUNT:-5}"
      BUCKET_PROFILE_FRAUD_MIN_COUNT: "${BUCKET_PROFILE_FRAUD_MIN_COUNT:-15}"
      BUCKET_EXACT_FALLBACK: "${BUCKET_EXACT_FALLBACK:-risky}"
    tmpfs:
      - /tmp
    volumes:
      - sockets:/sockets
    cpuset: "2,3"

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=4m,mode=0777
