name: 'rinha-2026-dotnet'

services:
  webapi1: &webapi
    image: ${WEBAPI_IMAGE:-ghcr.io/jonathanperis/rinha4-back-end-dotnet:latest}
    build:
      context: .
      dockerfile: ./src/WebApi/Dockerfile
      args:
        AOT: true
        EXTRA_OPTIMIZE: true
        BUILD_CONFIGURATION: Release
        BUILD_IVF: ${BUILD_IVF:-false}
        IVF_CLUSTERS: ${IVF_CLUSTERS:-2048}
        IVF_TRAIN_SAMPLE: ${IVF_TRAIN_SAMPLE:-65536}
        IVF_ITERATIONS: ${IVF_ITERATIONS:-6}
    container_name: webapi-1
    user: root
    restart: always
    read_only: true
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
      DOTNET_PROCESSOR_COUNT: "1"
      DOTNET_SYSTEM_NET_SOCKETS_INLINE_COMPLETIONS: "1"
      DOTNET_SYSTEM_NET_SOCKETS_THREAD_COUNT: "1"
      ACCEPT_LOOPS: "1"
      SCORER_MODE: ${SCORER_MODE:-bucket}
      IVF_FAST_NPROBE: ${IVF_FAST_NPROBE:-1}
      IVF_FULL_NPROBE: ${IVF_FULL_NPROBE:-1}
      IVF_BOUNDARY_FULL: ${IVF_BOUNDARY_FULL:-true}
      IVF_BBOX_REPAIR: ${IVF_BBOX_REPAIR:-true}
      IVF_EXACT_RERANK: ${IVF_EXACT_RERANK:-true}
      IVF_RERANK_CANDIDATES: ${IVF_RERANK_CANDIDATES:-6}
      IVF_REPAIR_MIN_FRAUDS: ${IVF_REPAIR_MIN_FRAUDS:-1}
      IVF_REPAIR_MAX_FRAUDS: ${IVF_REPAIR_MAX_FRAUDS:-4}
      SOCKET_PATH: /sockets/api1.sock
      DATA_PATH: /data/references.bin
    tmpfs:
      - /tmp
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD-SHELL", "test -S \"$${SOCKET_PATH}\""]
      interval: 100ms
      timeout: 100ms
      retries: 100
      start_period: 1s
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "165MB"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  webapi2:
    <<: *webapi
    container_name: webapi-2
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
      DOTNET_PROCESSOR_COUNT: "1"
      DOTNET_SYSTEM_NET_SOCKETS_INLINE_COMPLETIONS: "1"
      DOTNET_SYSTEM_NET_SOCKETS_THREAD_COUNT: "1"
      ACCEPT_LOOPS: "1"
      SCORER_MODE: ${SCORER_MODE:-bucket}
      IVF_FAST_NPROBE: ${IVF_FAST_NPROBE:-1}
      IVF_FULL_NPROBE: ${IVF_FULL_NPROBE:-1}
      IVF_BOUNDARY_FULL: ${IVF_BOUNDARY_FULL:-true}
      IVF_BBOX_REPAIR: ${IVF_BBOX_REPAIR:-true}
      IVF_EXACT_RERANK: ${IVF_EXACT_RERANK:-true}
      IVF_RERANK_CANDIDATES: ${IVF_RERANK_CANDIDATES:-6}
      IVF_REPAIR_MIN_FRAUDS: ${IVF_REPAIR_MIN_FRAUDS:-1}
      IVF_REPAIR_MAX_FRAUDS: ${IVF_REPAIR_MAX_FRAUDS:-4}
      SOCKET_PATH: /sockets/api2.sock
      DATA_PATH: /data/references.bin
    tmpfs:
      - /tmp
    volumes:
      - sockets:/sockets

  nginx:
    image: nginx:latest
    container_name: nginx-lb
    user: root
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    depends_on:
      webapi1:
        condition: service_healthy
      webapi2:
        condition: service_healthy
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20MB"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=4m,mode=0777
