name: 'rinha-2026-dotnet'

services:
  webapi1: &webapi
    image: ${WEBAPI_IMAGE:-ghcr.io/jonathanperis/rinha4-back-end-dotnet:latest}
    build:
      context: .
      dockerfile: ./src/WebApi/Dockerfile
      args:
        AOT: true
        EXTRA_OPTIMIZE: true
        BUILD_CONFIGURATION: Release
        EXACT_MAX_REFS: ${EXACT_MAX_REFS:-100000}
    container_name: webapi-1
    user: root
    restart: always
    read_only: true
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
      DOTNET_PROCESSOR_COUNT: "1"
      DOTNET_SYSTEM_NET_SOCKETS_INLINE_COMPLETIONS: "1"
      DOTNET_SYSTEM_NET_SOCKETS_THREAD_COUNT: "1"
      ACCEPT_LOOPS: "1"
      SCORER_MODE: exact
      SOCKET_PATH: /sockets/api1.sock
      DATA_DIR: /data
      EXACT_PATH: /data/references.bin
    tmpfs:
      - /tmp
    volumes:
      - sockets:/sockets
    cpuset: "1,2"
    healthcheck:
      test: ["CMD-SHELL", "test -S \"$${SOCKET_PATH}\""]
      interval: 100ms
      timeout: 100ms
      retries: 100
      start_period: 1s
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "165MB"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  webapi2:
    <<: *webapi
    container_name: webapi-2
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
      DOTNET_PROCESSOR_COUNT: "1"
      DOTNET_SYSTEM_NET_SOCKETS_INLINE_COMPLETIONS: "1"
      DOTNET_SYSTEM_NET_SOCKETS_THREAD_COUNT: "1"
      ACCEPT_LOOPS: "1"
      SCORER_MODE: exact
      SOCKET_PATH: /sockets/api2.sock
      DATA_DIR: /data
      EXACT_PATH: /data/references.bin
    tmpfs:
      - /tmp
    volumes:
      - sockets:/sockets
    cpuset: "2,3"

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=4m,mode=0777
