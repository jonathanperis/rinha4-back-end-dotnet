<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" role="img" aria-labelledby="title desc">
  <title id="title">Rinha4 fraud signal mark</title>
  <desc id="desc">A mint terminal-style fraud signal emblem with a vector grid, latency waveform, and R4 monogram.</desc>
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="core" x1="24" y1="20" x2="204" y2="132" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5cffb1" stop-opacity="0.95" />
      <stop offset="0.58" stop-color="#7d64ff" stop-opacity="0.88" />
      <stop offset="1" stop-color="#ff2d55" stop-opacity="0.92" />
    </linearGradient>
  </defs>

  <rect width="240" height="160" fill="#04120e" rx="10" />
  <g opacity="0.18" stroke="#5cffb1" stroke-width="1">
    <path d="M24 40h192M24 80h192M24 120h192M60 20v120M100 20v120M140 20v120M180 20v120" />
  </g>

  <g filter="url(#glow)">
    <path d="M54 28h84l42 52-42 52H54L24 80Z" fill="none" stroke="url(#core)" stroke-width="4" />
    <path d="M50 52h34l10 17 18-35 24 72 15-29h38" fill="none" stroke="#5cffb1" stroke-linecap="square" stroke-linejoin="miter" stroke-width="5" />
    <path d="M38 80h20M182 80h22" stroke="#ffb300" stroke-linecap="square" stroke-width="5" />
    <circle cx="94" cy="69" r="7" fill="#04120e" stroke="#5cffb1" stroke-width="4" />
    <circle cx="136" cy="106" r="7" fill="#04120e" stroke="#ff2d55" stroke-width="4" />
  </g>

  <g font-family="'Share Tech Mono', 'JetBrains Mono', monospace" font-weight="700" letter-spacing="-2">
    <text x="63" y="101" fill="#d6ffea" font-size="54">R4</text>
    <text x="153" y="108" fill="#ffb300" font-size="22">p99</text>
  </g>

  <path d="M18 18h28M18 18v28M222 142h-28M222 142v-28" fill="none" stroke="#5cffb1" stroke-width="4" />
</svg>
