admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

static_resources:
  listeners:
    - name: rinha_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9999
      filter_chains:
        - filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: rinha_tcp
                cluster: rinha_api
  clusters:
    - name: rinha_api
      type: STATIC
      connect_timeout: 0.2s
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: rinha_api
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    pipe:
                      path: /sockets/api1.sock
              - endpoint:
                  address:
                    pipe:
                      path: /sockets/api2.sock
