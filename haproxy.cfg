global
    maxconn 20000
    nbthread 1
    hard-stop-after 1s

defaults
    mode tcp
    maxconn 20000
    no log
    option dontlognull
    option tcpka
    retries 0
    timeout connect 200ms
    timeout client 5s
    timeout server 5s
    timeout queue 2s

frontend rinha_front
    bind *:9999 backlog 8192
    default_backend rinha_api

backend rinha_api
    balance roundrobin
    server api1 unix@/sockets/api1.sock maxconn 10000
    server api2 unix@/sockets/api2.sock maxconn 10000
