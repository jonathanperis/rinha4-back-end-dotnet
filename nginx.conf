worker_processes 1;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    use epoll;
    multi_accept on;
}

stream {
    upstream api {
        server unix:/sockets/api1.sock;
        server unix:/sockets/api2.sock;
        keepalive 64;
    }

    server {
        listen 9999 reuseport;
        proxy_pass api;
        proxy_timeout 3s;
        proxy_connect_timeout 1s;
    }
}
